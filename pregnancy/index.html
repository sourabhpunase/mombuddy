<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MomBuddy - Your AI-powered pregnancy companion app" />
    <meta name="keywords" content="pregnancy, pregnancy app, pregnancy tracker, trimester, baby development" />
    <title>MomBuddy - Your Pregnancy Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          var k = 'mombuddy-theme';
          var t = localStorage.getItem(k);
          if (t === 'dark') document.documentElement.classList.add('dark');
          else if (t === 'light') document.documentElement.classList.remove('dark');
          else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
            document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
